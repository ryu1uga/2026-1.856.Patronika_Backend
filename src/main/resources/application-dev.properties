spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/patronika_db
spring.datasource.username=patronika
spring.datasource.password=patronika


spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework=DEBUG
logging.level.pe.edu.ulima=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

rate-limit.default.capacity=120
rate-limit.default.refill-tokens=120
rate-limit.default.refill-period=PT1M

rate-limit.login.capacity=20
rate-limit.login.refill-tokens=20
rate-limit.login.refill-period=PT1M