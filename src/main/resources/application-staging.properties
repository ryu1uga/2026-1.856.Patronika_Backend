spring.config.activate.on-profile=staging

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.username=${DB_USERNAME}

spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework=INFO
logging.level.pe.edu.ulima=DEBUG

server.port=${PORT:8080}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

rate-limit.default.capacity=60
rate-limit.default.refill-tokens=60
rate-limit.default.refill-period=PT1M

rate-limit.login.capacity=10
rate-limit.login.refill-tokens=10
rate-limit.login.refill-period=PT1M